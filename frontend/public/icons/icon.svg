<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Subtle top sheen -->
  <rect width="512" height="256" rx="100" fill="url(#glow)"/>

  <!-- Airplane (top-down view, white) -->
  <!-- Fuselage -->
  <path d="M256 72 C272 72 282 88 282 112 L282 348 C282 368 272 382 256 382 C240 382 230 368 230 348 L230 112 C230 88 240 72 256 72 Z" fill="white"/>
  <!-- Left wing (swept back) -->
  <path d="M230 188 L76 274 L76 302 L230 236 Z" fill="white"/>
  <!-- Right wing -->
  <path d="M282 188 L436 274 L436 302 L282 236 Z" fill="white"/>
  <!-- Left tail fin -->
  <path d="M230 308 L152 352 L152 370 L230 338 Z" fill="white"/>
  <!-- Right tail fin -->
  <path d="M282 308 L360 352 L360 370 L282 338 Z" fill="white"/>
  <!-- Cockpit window -->
  <ellipse cx="256" cy="104" rx="14" ry="20" fill="rgba(20,184,166,0.7)"/>

  <!-- Orange location pin at bottom -->
  <circle cx="256" cy="424" r="26" fill="#ea580c"/>
  <path d="M256 450 Q232 472 256 494 Q280 472 256 450 Z" fill="#ea580c"/>
</svg>
