<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d9488"/>

  <!-- Globe outline -->
  <circle cx="256" cy="230" r="140" fill="none" stroke="white" stroke-width="18" opacity="0.9"/>

  <!-- Latitude lines -->
  <ellipse cx="256" cy="230" rx="140" ry="55" fill="none" stroke="white" stroke-width="10" opacity="0.5"/>
  <line x1="116" y1="230" x2="396" y2="230" stroke="white" stroke-width="10" opacity="0.5"/>

  <!-- Longitude arc -->
  <ellipse cx="256" cy="230" rx="55" ry="140" fill="none" stroke="white" stroke-width="10" opacity="0.5"/>

  <!-- Location pin -->
  <circle cx="256" cy="195" r="28" fill="#ea580c"/>
  <path d="M256 223 Q230 260 256 295 Q282 260 256 223Z" fill="#ea580c"/>

  <!-- App name -->
